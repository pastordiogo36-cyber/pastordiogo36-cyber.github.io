    async function procesarImagenArchivo(file) {
      const dataUrl = await new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = e => resolve(String(e.target.result || ''));
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });

      const img = await new Promise((resolve, reject) => {
        const i = new Image();
        i.onload = () => resolve(i);
        i.onerror = reject;
        i.src = dataUrl;
      });

      const maxDim = 320;
      const w = img.width;
      const h = img.height;
      const scale = Math.min(1, maxDim / Math.max(w, h));
      const tw = Math.max(1, Math.round(w * scale));
      const th = Math.max(1, Math.round(h * scale));

      const canvas = document.createElement('canvas');
      canvas.width = tw;
      canvas.height = th;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, tw, th);
      return canvas.toDataURL('image/jpeg', 0.72);
    }

    window.guardarPerfilCongregante = async function (congreganteId) {
      const nombre = document.getElementById('edit-nombre')?.value?.trim();
      const telefono = document.getElementById('edit-telefono')?.value?.trim();

      if (!nombre) {
        mostrarToast('⚠️ El nombre es obligatorio', 'error');
        return;
      }

      const update = {
        nombre,
        telefono: telefono || null
      };

      if (state.fotoEdicion) update.foto_url = state.fotoEdicion;

      try {
        const okSesion = await asegurarSesionVigente();
        if (!okSesion) return;
        const { error } = await withTimeout(
          sb.from('congregantes').update(update).eq('id', congreganteId),
          12000,
          'guardar perfil congregante'
        );
        if (error) throw error;

        actualizarCongreganteEnColecciones(congreganteId, update);
        state.fotoEdicion = null;
        mostrarToast('✅ Datos actualizados');
        render();
      } catch (e) {
        console.error('Error al guardar perfil congregante:', e);
        mostrarToast('⚠️ No se pudo guardar: ' + (e?.message || 'sin detalle'), 'error');
        await cargarCongregantes();
        if (state.usuario?.rol === 'nangareko') await cargarDatosNangareko();
        render();
      }
    };

    async function cargarCongregantes() {
      const { data, error } = await sb.from('congregantes').select('*').order('nombre');
      if (error) {
        console.error('Error al cargar congregantes:', error);
        mostrarToast('⚠️ No se pudieron cargar los congregantes (ver permisos/RLS)', 'error');
        state.congregantes = [];
        return;
      }
      state.congregantes = data || [];
    }

    async function cargarAsistenciasHoy() {
      const hoy = new Date().toISOString().split('T')[0];
      const { data, error } = await sb.from('asistencias')
        .select('congregante_id, usuario_id, presente')
        .eq('tipo_servicio', state.servicioActivo)
        .eq('fecha', hoy);
      if (error) {
        console.error('Error al cargar asistencias:', error);
        mostrarToast('⚠️ No se pudieron cargar asistencias (ver permisos/RLS)', 'error');
      }
      state.asistenciasHoy = {};
      (data || []).forEach(a => {
        if (a.usuario_id) {
          state.asistenciasHoy[`usuario:${a.usuario_id}`] = a.presente;
        } else if (a.congregante_id) {
          state.asistenciasHoy[`congregante:${a.congregante_id}`] = a.presente;
        }
      });
      if (!state.asistenciasPorServicio) state.asistenciasPorServicio = { domingo: {}, miercoles: {} };
      state.asistenciasPorServicio[state.servicioActivo] = { ...state.asistenciasHoy };
    }

    async function cargarStatsHory() {
      const el = document.getElementById('stats-hory');
      if (!el) return;
      await cargarCongregantes();
      const hoy = new Date().toISOString().split('T')[0];
      const { data: asist } = await sb.from('asistencias').select('presente').eq('fecha', hoy);
      const presentes = (asist || []).filter(a => a.presente).length;
      const nuevos = state.congregantes.filter(c => c.estado === 'nuevo').length;
      el.innerHTML = `
      <div class="stats-row">
        <div class="stat-card"><div class="stat-numero">${state.congregantes.length}</div><div class="stat-label">Congregantes</div></div>
        <div class="stat-card"><div class="stat-numero" style="color:var(--verde)">${presentes}</div><div class="stat-label">Hoy presentes</div></div>
        <div class="stat-card"><div class="stat-numero" style="color:var(--dorado)">${nuevos}</div><div class="stat-label">Nuevos</div></div>
      </div>`;
    }

    // Initialize application when DOM is ready
    document.addEventListener('DOMContentLoaded', init);

    // Initial app load function
    async function init() {
      const { data: { session } } = await sb.auth.getSession();
      state.session = session;

      document.addEventListener('visibilitychange', async () => {
        if (document.visibilityState === 'visible' && state.session) {
          try { await asegurarSesionVigente(); } catch (e) { console.error(e); }
        }
      });

      window.addEventListener('focus', async () => {
        if (state.session) {
          try { await asegurarSesionVigente(); } catch (e) { console.error(e); }
        }
      });

      setInterval(async () => {
        if (state.session) {
          try { await asegurarSesionVigente(); } catch (e) { console.error(e); }
        }
      }, 5 * 60 * 1000);

      if (session) {
        await cargarUsuario();
        setupRealtimeListeners();

        if (state.usuario?.rol === 'pastor') await cargarDatosPastor();
        if (state.usuario?.rol === 'nangareko') await cargarDatosNangareko();
        if (state.usuario?.rol === 'lider_dc') await cargarDatosLiderDC();
        if (state.usuario?.rol === 'hory') await cargarStatsHory();
      }

      state.loading = false;
      render();

      sb.auth.onAuthStateChange(async (event, session) => {
        state.session = session;
        if (session) {
          await cargarUsuario();
          setupRealtimeListeners();

          if (state.usuario?.rol === 'pastor') await cargarDatosPastor();
          if (state.usuario?.rol === 'nangareko') await cargarDatosNangareko();
          if (state.usuario?.rol === 'lider_dc') await cargarDatosLiderDC();
          if (state.usuario?.rol === 'hory') await cargarStatsHory();
        } else {
          state.usuario = null;
          cleanupRealtimeListeners();
        }
        render();
      });

 	  const ONESIGNAL_BASE_PATH = '/';

	  if ('serviceWorker' in navigator) {
		window.__onesignalSwRegistrationPromise = (async () => {
			try {
				// Si esta página está controlada por un SW viejo, puede interceptar la descarga del SW de OneSignal
				// y devolver un 404 "fantasma". En ese caso, desregistramos todo y recargamos UNA sola vez.
				if (navigator.serviceWorker.controller && !sessionStorage.getItem('sw_reset_done')) {
					sessionStorage.setItem('sw_reset_done', '1');
					const regs0 = await navigator.serviceWorker.getRegistrations();
					for (const reg of regs0) {
						try { await reg.unregister(); } catch (e) { /* noop */ }
					}
					setTimeout(() => location.reload(), 50);
					return null;
				}

				const regs = await navigator.serviceWorker.getRegistrations();
				for (const reg of regs) {
					try { await reg.unregister(); } catch (e) { /* noop */ }
				}

				window.__onesignalSwRegistration = await navigator.serviceWorker.register(
					`${ONESIGNAL_BASE_PATH}OneSignalSDKWorker.js`,
					{ scope: ONESIGNAL_BASE_PATH }
				);
				return window.__onesignalSwRegistration;
			} catch (e) {
				console.error('No se pudo registrar el service worker:', e);
				return null;
			}
		})();
	  }

	  const ONESIGNAL_APP_ID = '118093bb-70fa-4c85-be91-e4d75404c283';
	  if (ONESIGNAL_APP_ID) {
		window.OneSignalDeferred = window.OneSignalDeferred || [];
		OneSignalDeferred.push(async function (OneSignal) {
			const scopeBase = ONESIGNAL_BASE_PATH;
			let swReg = null;
			try {
				swReg = await (window.__onesignalSwRegistrationPromise || Promise.resolve(window.__onesignalSwRegistration || null));
				if (!swReg && 'serviceWorker' in navigator) {
					swReg = await navigator.serviceWorker.getRegistration(scopeBase);
				}
			} catch (e) {
				console.error('No se pudo obtener serviceWorkerRegistration:', e);
			}

			await OneSignal.init({
				appId: ONESIGNAL_APP_ID,
				serviceWorkerRegistration: swReg || undefined,
				serviceWorkerPath: `${ONESIGNAL_BASE_PATH}OneSignalSDKWorker.js`,
				serviceWorkerUpdaterPath: `${ONESIGNAL_BASE_PATH}OneSignalSDKUpdaterWorker.js`,
				serviceWorkerParam: { scope: scopeBase },
				notifyButton: {
					enable: true
				}
			});

			try {
				await OneSignal.User?.PushSubscription?.optIn?.();
			} catch (e) {
				console.error('Error al hacer opt-in en OneSignal:', e);
			}

			try {
				const osId = await OneSignal.User?.onesignalId;
				const pushId = await OneSignal.User?.PushSubscription?.id;
				console.log('OneSignal:', { osId, pushId, scopeBase });
				await guardarOneSignalIdsEnUsuario({ osId, pushId });
			} catch (e) {
				console.error('Diagnóstico OneSignal error:', e);
			}

			try {
				const perm = await OneSignal.Notifications.permission;
				if (perm !== 'granted') {
					await OneSignal.Notifications.requestPermission();
				}
			} catch (e) {
				console.error('Error al solicitar permiso de notificaciones:', e);
			}
		});
	  }
    }
  </script>
