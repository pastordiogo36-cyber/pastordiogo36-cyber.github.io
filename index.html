<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Pastoreo</title>
  <meta name="theme-color" content="#c0392b" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="logo_de_redencion.png" />
  <link rel="apple-touch-icon" href="logo_de_redencion.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap"
    rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
  <style>
    /* ===== TODOS LOS ESTILOS EXISTENTES SE MANTIENEN ===== */
    :root {
      --rojo: #c0392b;
      --rojo-oscuro: #922b21;
      --rojo-claro: #e74c3c;
      --dorado: #f39c12;
      --verde: #27ae60;
      --negro: #0d0d0d;
      --gris-oscuro: #1a1a1a;
      --gris-medio: #2d2d2d;
      --gris-claro: #4a4a4a;
      --blanco: #fafafa;
      --texto-suave: #b0a090;
      --radio: 16px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--negro);
      color: var(--blanco);
      min-height: 100vh;
      max-width: 480px;
      margin: 0 auto;
      overflow-x: hidden;
    }

    body.home-body {
      background-image: linear-gradient(rgba(0, 0, 0, 0.68), rgba(0, 0, 0, 0.68)), url('fondo_inicio.jpeg');
      background-size: cover;
      background-repeat: no-repeat;
      background-position: center top;
      background-attachment: scroll;
    }

    /* ===== LOGIN ===== */
    .login-screen {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      background: transparent;
    }

    .logo-placeholder {
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: none;
      border: none;
      margin-bottom: 12px;
    }

    .logo-placeholder img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
      display: block;
    }

    .app-title {
      font-family: 'Playfair Display', serif;
      font-size: 38px;
      font-weight: 900;
    }

    .app-subtitle {
      font-size: 13px;
      color: var(--texto-suave);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-top: 2px;
    }

    .login-card {
      background: var(--gris-oscuro);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: var(--radio);
      padding: 32px 28px;
      width: 100%;
      margin-top: 40px;
    }

    .login-card h2 {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      margin-bottom: 8px;
    }

    .login-card p {
      color: var(--texto-suave);
      font-size: 14px;
      margin-bottom: 28px;
    }

    .input-group {
      margin-bottom: 16px;
    }

    .input-group label {
      display: block;
      font-size: 12px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--texto-suave);
      margin-bottom: 8px;
    }

    .input-group input,
    .input-group select,
    .input-group textarea {
      width: 100%;
      background: var(--gris-medio);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      padding: 14px 16px;
      color: var(--blanco);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
      appearance: none;
    }

    .input-group input:focus,
    .input-group select:focus,
    .input-group textarea:focus {
      border-color: var(--rojo);
    }

    .btn-primary {
      width: 100%;
      background: var(--rojo);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s, transform 0.1s;
    }

    .btn-primary:hover {
      background: var(--rojo-claro);
    }

    .btn-primary:active {
      transform: scale(0.98);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-secondary {
      width: 100%;
      background: transparent;
      border: 1px solid var(--rojo);
      color: var(--rojo-claro);
      border-radius: 10px;
      padding: 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 8px;
    }

    .btn-secondary:hover {
      background: rgba(192, 57, 43, 0.1);
    }

    .error-msg {
      background: rgba(192, 57, 43, 0.15);
      border: 1px solid rgba(192, 57, 43, 0.3);
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 13px;
      color: #e74c3c;
      margin-top: 12px;
    }

    .success-msg {
      background: rgba(39, 174, 96, 0.15);
      border: 1px solid rgba(39, 174, 96, 0.3);
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 13px;
      color: #2ecc71;
      margin-top: 12px;
    }

    /* ===== HEADER ===== */
    .app-header {
      background: var(--gris-oscuro);
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      padding: 14px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-icon {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: var(--rojo);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .header-icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
      display: block;
    }

    .header-title {
      font-family: 'Playfair Display', serif;
      font-size: 19px;
      font-weight: 700;
    }

    .header-user {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .user-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.10);
      color: var(--blanco);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.5px;
      user-select: none;
      overflow: hidden;
    }

    .user-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
    }

    .rol-badge {
      font-size: 11px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 20px;
      font-weight: 600;
    }

    .rol-pastor {
      background: rgba(192, 57, 43, 0.2);
      color: var(--rojo-claro);
      border: 1px solid rgba(192, 57, 43, 0.3);
    }

    .rol-hory {
      background: rgba(192, 57, 43, 0.2);
      color: var(--rojo-claro);
      border: 1px solid rgba(192, 57, 43, 0.3);
    }

    .rol-nangareko {
      background: rgba(39, 174, 96, 0.2);
      color: #2ecc71;
      border: 1px solid rgba(39, 174, 96, 0.3);
    }

    .rol-lider_dc {
      background: rgba(52, 152, 219, 0.2);
      color: #3498db;
      border: 1px solid rgba(52, 152, 219, 0.3);
    }

    .btn-logout {
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: var(--texto-suave);
      border-radius: 8px;
      padding: 7px 12px;
      font-size: 13px;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.2s;
    }

    .btn-logout:hover {
      border-color: var(--rojo);
      color: var(--rojo-claro);
    }

    /* ===== CONTENIDO ===== */
    .main-content {
      padding: 18px 18px 100px;
    }

    .welcome-banner {
      background: linear-gradient(135deg, var(--rojo-oscuro), var(--gris-medio));
      border-radius: var(--radio);
      padding: 22px;
      margin-bottom: 20px;
      position: relative;
      overflow: hidden;
    }

    .welcome-banner::after {
      content: '✝';
      position: absolute;
      right: 18px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 56px;
      opacity: 0.08;
    }

    .welcome-banner h2 {
      font-family: 'Playfair Display', serif;
      font-size: 21px;
      margin-bottom: 5px;
    }

    .welcome-banner p {
      color: rgba(255, 255, 255, 0.7);
      font-size: 14px;
    }

    /* ===== MENÚ CARDS ===== */
    .menu-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 20px;
    }

    .menu-card {
      background: var(--gris-oscuro);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: var(--radio);
      padding: 20px 16px;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .menu-card:hover {
      border-color: var(--rojo);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(192, 57, 43, 0.2);
    }

    .menu-card .icon {
      font-size: 32px;
    }

    .menu-card .card-title {
      font-size: 13px;
      font-weight: 600;
    }

    .menu-card .card-desc {
      font-size: 11px;
      color: var(--texto-suave);
      line-height: 1.4;
    }

    .menu-card-full {
      grid-column: 1 / -1;
    }

    /* ===== SECCIÓN HEADER ===== */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .section-header h3 {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
    }

    .btn-back {
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: var(--texto-suave);
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 13px;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
    }

    .btn-back:hover {
      border-color: rgba(255, 255, 255, 0.3);
      color: var(--blanco);
    }

    /* ===== SERVICIO SELECTOR ===== */
    .servicio-selector {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .servicio-btn {
      flex: 1;
      padding: 14px 10px;
      border: 2px solid rgba(255, 255, 255, 0.08);
      background: var(--gris-oscuro);
      color: var(--texto-suave);
      border-radius: 12px;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      text-align: center;
      transition: all 0.2s;
    }

    .servicio-btn.active {
      border-color: var(--rojo);
      color: var(--blanco);
      background: rgba(192, 57, 43, 0.15);
    }

    .servicio-btn .dia {
      font-size: 16px;
      margin-bottom: 4px;
    }

    .servicio-btn .hora {
      font-size: 11px;
      color: var(--texto-suave);
      margin-top: 2px;
    }

    /* ===== LISTA CONGREGANTES ===== */
    .search-input {
      width: 100%;
      background: var(--gris-medio);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      padding: 12px 16px;
      color: var(--blanco);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      outline: none;
      margin-bottom: 14px;
      transition: border-color 0.2s;
    }

    .search-input:focus {
      border-color: var(--rojo);
    }

    .congregante-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--gris-oscuro);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 12px 14px;
      margin-bottom: 8px;
      transition: all 0.2s;
    }

    .congregante-item.presente {
      border-color: rgba(39, 174, 96, 0.3);
      background: rgba(39, 174, 96, 0.05);
    }

    .congregante-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .congregante-foto {
      width: 84px;
      height: 84px;
      border-radius: 50%;
      background: var(--gris-medio);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      overflow: hidden;
      flex-shrink: 0;
      border: 2px solid rgba(255, 255, 255, 0.08);
    }

    .congregante-foto img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .congregante-nombre {
      font-size: 14px;
      font-weight: 500;
    }

    .congregante-estado {
      font-size: 11px;
      color: var(--texto-suave);
      margin-top: 2px;
    }

    .estado-nuevo {
      color: #f39c12;
    }

    .estado-en_proceso {
      color: #3498db;
    }

    .estado-graduado {
      color: #2ecc71;
    }

    /* ===== SWITCH ===== */
    .switch {
      position: relative;
      display: inline-block;
      width: 50px;
      height: 28px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: var(--gris-claro);
      transition: 0.3s;
      border-radius: 28px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 22px;
      width: 22px;
      left: 3px;
      bottom: 3px;
      background: white;
      transition: 0.3s;
      border-radius: 50%;
    }

    input:checked+.slider {
      background: var(--verde);
    }

    input:checked+.slider:before {
      transform: translateX(22px);
    }

    /* ===== NUEVO INGRESO ===== */
    .nuevo-form {
      background: var(--gris-oscuro);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: var(--radio);
      padding: 24px;
    }

    .foto-upload {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      background: var(--gris-medio);
      border: 2px dashed rgba(255, 255, 255, 0.2);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      margin: 0 auto 20px;
      font-size: 24px;
      transition: all 0.2s;
    }

    .foto-upload > div {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .foto-upload:hover {
      border-color: var(--rojo);
    }

    .foto-upload span {
      font-size: 10px;
      color: var(--texto-suave);
      position: absolute;
      left: 0;
      right: 0;
      bottom: 8px;
      margin-top: 0;
      text-align: center;
      pointer-events: none;
    }

    .foto-upload img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
      border-radius: 50%;
    }

    /* ===== ESTADÍSTICAS ===== */
    .stats-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      margin-bottom: 20px;
    }

    .stat-card {
      background: var(--gris-oscuro);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 12px;
      padding: 14px 10px;
      text-align: center;
    }

    .stat-numero {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      font-weight: 700;
    }

    .stat-label {
      font-size: 11px;
      color: var(--texto-suave);
      margin-top: 4px;
    }

    /* ===== INFO SECTION ===== */
    .info-section {
      background: var(--gris-oscuro);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: var(--radio);
      padding: 20px;
      margin-bottom: 16px;
    }

    .info-section h3 {
      font-size: 13px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--texto-suave);
      margin-bottom: 16px;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
      font-size: 14px;
    }

    .info-row:last-child {
      border-bottom: none;
    }

    .info-row .label {
      color: var(--texto-suave);
    }

    @media (max-width: 480px) {
      .info-section {
        padding: 16px;
      }

      .info-row {
        flex-direction: column;
        align-items: flex-start;
        gap: 8px;
      }

      .info-row select,
      .info-row input {
        width: 100% !important;
        max-width: 100% !important;
      }

      .mobile-actions {
        flex-direction: column !important;
      }
    }

    /* ===== COMING SOON ===== */
    .coming-soon {
      text-align: center;
      padding: 48px 24px;
      color: var(--texto-suave);
    }

    .coming-soon .big-icon {
      font-size: 56px;
      margin-bottom: 16px;
    }

    .coming-soon h3 {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      color: var(--blanco);
      margin-bottom: 8px;
    }

    .coming-soon p {
      font-size: 14px;
      line-height: 1.6;
    }

    .tag-etapa {
      display: inline-block;
      background: rgba(192, 57, 43, 0.15);
      border: 1px solid rgba(192, 57, 43, 0.3);
      color: var(--rojo-claro);
      font-size: 11px;
      letter-spacing: 1px;
      padding: 4px 10px;
      border-radius: 20px;
      margin-top: 12px;
    }

    /* ===== LOADING ===== */
    .loading-screen {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 3px solid rgba(192, 57, 43, 0.2);
      border-top-color: var(--rojo);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    .setup-screen {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      background: radial-gradient(ellipse at 50% 20%, #1a0a00 0%, var(--negro) 65%);
    }

    .setup-form {
      width: 100%;
      background: var(--gris-oscuro);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: var(--radio);
      padding: 28px;
    }

    /* ===== TOAST ===== */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--verde);
      color: white;
      padding: 12px 24px;
      border-radius: 24px;
      font-size: 14px;
      font-weight: 500;
      z-index: 999;
      animation: fadeInUp 0.3s ease;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
      white-space: nowrap;
    }

    .toast.error {
      background: var(--rojo);
    }

    /* ===== MODAL ===== */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.8);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .modal-content {
      background: var(--gris-oscuro);
      border-radius: var(--radio);
      padding: 24px;
      max-width: 90%;
      width: 400px;
      max-height: 80vh;
      overflow-y: auto;
    }

    @keyframes fadeInDown {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px) translateX(-50%);
      }

      to {
        opacity: 1;
        transform: translateY(0) translateX(-50%);
      }
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>
  <div id="app"></div>

  <script>
    // ============================================
    // SUPABASE CONFIGURATION
    // ============================================
    const { createClient } = supabase;

    async function calcularAvisosNangareko(cuidados) {
      const hoy = new Date();
      const hoyYmd = hoy.toISOString().split('T')[0];
      const ids = (cuidados || []).map(c => c.id).filter(Boolean);
      if (ids.length === 0) return [];

      const { data: asistData, error: asistError } = await sb
        .from('asistencias')
        .select('congregante_id, tipo_servicio, fecha, presente')
        .in('congregante_id', ids)
        .in('tipo_servicio', ['miercoles', 'domingo'])
        .eq('presente', true)
        .order('fecha', { ascending: true });
      if (asistError) throw asistError;

      if (!Array.isArray(asistData) || asistData.length === 0) {
        return [];
      }

      const { data: fichasData, error: fichasError } = await sb
        .from('fichas_nangareko')
        .select('congregante_id, created_at, notas_adicionales')
        .in('congregante_id', ids)
        .eq('nangareko_id', state.usuario.id)
        .order('created_at', { ascending: false });
      if (fichasError) {
        console.error('Error al leer fichas (Ñangareko):', fichasError);
      }

      const primeraAsistenciaPorId = new Map();
      for (const r of (asistData || [])) {
        if (!r?.congregante_id || !r?.fecha) continue;
        if (!primeraAsistenciaPorId.has(r.congregante_id)) {
          primeraAsistenciaPorId.set(r.congregante_id, r);
        }
      }

      const ultimaFichaPorId = new Map();
      for (const f of ((fichasData || []))) {
        if (!f?.congregante_id || !f?.created_at) continue;
        if (String(f.notas_adicionales || '').trim() === 'Primer contacto - Asignación inicial') continue;
        if (!ultimaFichaPorId.has(f.congregante_id)) {
          ultimaFichaPorId.set(f.congregante_id, String(f.created_at).slice(0, 10));
        }
      }

      const esDiaServicio = (d) => {
        const dow = d.getDay();
        return dow === 0 || dow === 3;
      };

      const parseYmd = (ymd) => {
        const [y, m, dd] = String(ymd).split('-').map(Number);
        return new Date(y, (m || 1) - 1, dd || 1);
      };

      const diasEntre = (a, b) => {
        const ms = 24 * 60 * 60 * 1000;
        const da = new Date(a.getFullYear(), a.getMonth(), a.getDate());
        const db = new Date(b.getFullYear(), b.getMonth(), b.getDate());
        return Math.floor((db - da) / ms);
      };

      const addDias = (d, n) => {
        const x = new Date(d);
        x.setDate(x.getDate() + n);
        return x;
      };

      const esLunes = (d) => d.getDay() === 1;
      const esJueves = (d) => d.getDay() === 4;

      const avisos = [];

      for (const c of (cuidados || [])) {
        const nombre = c?.nombre || 'Sin nombre';
        const primera = primeraAsistenciaPorId.get(c.id);
        if (!primera?.fecha) continue;

        const baseYmd = primera.fecha;
        const base = parseYmd(baseYmd);
        const diasDesdeIngreso = diasEntre(base, hoy);

        const ultimaFichaYmd = ultimaFichaPorId.get(c.id) || null;

        let debeHoy = false;
        let atrasadoDesde = null;
        let fechaAvisoYmd = null;

        if (diasDesdeIngreso < 30) {
          let d = addDias(base, 1);
          while (esDiaServicio(d)) d = addDias(d, 1);

          let ultima = null;
          while (d <= hoy) {
            ultima = new Date(d);
            d = addDias(d, 2);
            while (esDiaServicio(d)) d = addDias(d, 1);
          }

          if (ultima) {
            const ultimaYmd = ultima.toISOString().split('T')[0];
            if (ultimaYmd === hoyYmd) {
              debeHoy = true;
              fechaAvisoYmd = hoyYmd;
            } else {
              const atraso = diasEntre(ultima, hoy);
              if (atraso >= 1 && atraso <= 7) {
                debeHoy = true;
                atrasadoDesde = ultima;
                fechaAvisoYmd = ultimaYmd;
              }
            }
          }
        } else if (diasDesdeIngreso < 60) {
          if (esLunes(hoy) || esJueves(hoy)) {
            debeHoy = true;
            fechaAvisoYmd = hoyYmd;
          }
        } else {
          if (esLunes(hoy)) {
            debeHoy = true;
            fechaAvisoYmd = hoyYmd;
          }
        }

        if (debeHoy) {
          if (fechaAvisoYmd && ultimaFichaYmd && ultimaFichaYmd >= fechaAvisoYmd) {
            continue;
          }
          const extra = atrasadoDesde ? ` (atrasado desde ${atrasadoDesde.toLocaleDateString()})` : '';
          avisos.push({
            tipo: 'alimentar',
            congregante_id: c.id,
            nombre,
            mensaje: `Alimenta a ${nombre}${extra}`
          });
        }
      }

      return avisos;
    }

    async function calcularAvisosLiderDC(miembros) {
      const hoy = new Date();
      const hoyYmd = hoy.toISOString().split('T')[0];
      const ids = (miembros || []).map(m => m.id).filter(Boolean);
      if (ids.length === 0) return [];

      const parseYmd = (ymd) => {
        const [y, m, dd] = String(ymd).split('-').map(Number);
        return new Date(y, (m || 1) - 1, dd || 1);
      };

      const addDias = (d, n) => {
        const x = new Date(d);
        x.setDate(x.getDate() + n);
        return x;
      };

      const addMes = (d, n) => {
        const x = new Date(d);
        const day = x.getDate();
        x.setMonth(x.getMonth() + n);
        if (x.getDate() !== day) x.setDate(0);
        return x;
      };

      const inicio30 = new Date(hoy);
      inicio30.setDate(inicio30.getDate() - 30);
      const inicio30Ymd = inicio30.toISOString().split('T')[0];

      const dcOficialDesdePorId = new Map();
      for (const m of (miembros || [])) {
        if (!m?.id) continue;
        const ymd = String(m?.dc_oficial_desde || '').slice(0, 10);
        if (ymd && /^\d{4}-\d{2}-\d{2}$/.test(ymd)) dcOficialDesdePorId.set(m.id, ymd);
      }

      const [asistDcRes, ausenciasRes, fichasRes] = await Promise.all([
        sb.from('asistencias')
          .select('congregante_id, fecha')
          .in('congregante_id', ids)
          .eq('tipo_servicio', 'dc')
          .eq('presente', true)
          .order('fecha', { ascending: true }),
        sb.from('asistencias')
          .select('congregante_id, fecha')
          .in('congregante_id', ids)
          .in('tipo_servicio', ['domingo', 'miercoles', 'dc'])
          .eq('presente', false)
          .gte('fecha', inicio30Ymd)
          .order('fecha', { ascending: true }),
        sb.from('fichas_dc')
          .select('congregante_id, created_at, es_por_ausencia')
          .eq('lider_id', state.usuario.id)
          .in('congregante_id', ids)
          .order('created_at', { ascending: false })
      ]);

      if (asistDcRes.error) throw asistDcRes.error;
      if (ausenciasRes.error) throw ausenciasRes.error;
      if (fichasRes.error) throw fichasRes.error;

      const primeraDcPorId = new Map();
      for (const r of (asistDcRes.data || [])) {
        if (!r?.congregante_id || !r?.fecha) continue;
        const oficialDesdeYmd = dcOficialDesdePorId.get(r.congregante_id) || null;
        if (oficialDesdeYmd && String(r.fecha) < oficialDesdeYmd) continue;
        if (!primeraDcPorId.has(r.congregante_id)) primeraDcPorId.set(r.congregante_id, r.fecha);
      }

      const ausenciasPorId = new Map();
      for (const r of (ausenciasRes.data || [])) {
        if (!r?.congregante_id || !r?.fecha) continue;
        if (!ausenciasPorId.has(r.congregante_id)) ausenciasPorId.set(r.congregante_id, []);
        ausenciasPorId.get(r.congregante_id).push(r.fecha);
      }

      const ultimaFichaPorId = new Map();
      const ultimaFichaAusenciaPorId = new Map();
      for (const f of (fichasRes.data || [])) {
        if (!f?.congregante_id || !f?.created_at) continue;
        if (!ultimaFichaPorId.has(f.congregante_id)) {
          ultimaFichaPorId.set(f.congregante_id, String(f.created_at).slice(0, 10));
        }
        if (f.es_por_ausencia && !ultimaFichaAusenciaPorId.has(f.congregante_id)) {
          ultimaFichaAusenciaPorId.set(f.congregante_id, String(f.created_at).slice(0, 10));
        }
      }

      const avisos = [];
      for (const m of (miembros || [])) {
        const id = m?.id;
        if (!id) continue;

        // Alimenta mensual (desde el día siguiente del primer DC)
        const primeraDcYmd = primeraDcPorId.get(id);
        if (primeraDcYmd) {
          const base = parseYmd(primeraDcYmd);
          const primerAviso = addDias(base, 1);
          if (primerAviso <= hoy) {
            let due = new Date(primerAviso);
            while (addMes(due, 1) <= hoy) due = addMes(due, 1);
            const dueYmd = due.toISOString().split('T')[0];
            const ultimaFichaYmd = ultimaFichaPorId.get(id) || null;
            if (!(dueYmd && ultimaFichaYmd && ultimaFichaYmd >= dueYmd)) {
              const atraso = dueYmd === hoyYmd ? '' : ` (atrasado desde ${due.toLocaleDateString()})`;
              avisos.push({
                tipo: 'alimentar',
                congregante_id: id,
                nombre: m?.nombre || 'Sin nombre',
                mensaje: `Alimenta a ${(m?.nombre || 'Sin nombre')}${atraso}`
              });
            }
          }
        }

        // Ausencias acumulativas (3 ausencias en últimos 30 días)
        const fechas = (ausenciasPorId.get(id) || []).filter(Boolean);
        if (fechas.length >= 3) {
          const uniq = Array.from(new Set(fechas)).sort();
          if (uniq.length >= 3) {
            const terceraYmd = uniq[2];
            const tercera = parseYmd(terceraYmd);
            const trigger = addDias(tercera, 1);
            const triggerYmd = trigger.toISOString().split('T')[0];
            if (trigger <= hoy) {
              const ultimaAusYmd = ultimaFichaAusenciaPorId.get(id) || null;
              if (!(triggerYmd && ultimaAusYmd && ultimaAusYmd >= triggerYmd)) {
                avisos.push({
                  tipo: 'ausencias',
                  congregante_id: id,
                  nombre: m?.nombre || 'Sin nombre',
                  mensaje: `Ausencias de ${(m?.nombre || 'Sin nombre')} (3 en 30 días)`
                });
              }
            }
          }
        }
      }

      return avisos;
    }

    // Toast notifications
    function mostrarToast(msg, tipo = 'ok') {
      const t = document.createElement('div');
      t.className = 'toast' + (tipo === 'error' ? ' error' : '');
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 3000);

    // Sanitize user input (prevents XSS)
    function sanitizar(texto) {
      if (!texto) return '';
      const div = document.createElement('div');
      div.textContent = texto;
      return div.innerHTML;
    }

    function getIniciales(nombre) {
      return String(nombre || '')
        .trim()
        .split(/\s+/)
        .filter(Boolean)
        .map(p => p[0])
        .join('')
        .substring(0, 2)
        .toUpperCase();
    }

    // Debounce function to limit execution frequency (performance optimization)
    function debounce(fn, delay) {
      let timeoutId;
      return function (...args) {
        clearTimeout(timeoutId);
        timeoutId = setTimeout(() => {
          fn.apply(this, args);
        }, delay);
      };
    }

    function withTimeout(promise, ms, label) {
      let timeoutId;
      const timeoutPromise = new Promise((_, reject) => {
        timeoutId = setTimeout(() => {
          reject(new Error(`Timeout: ${label || 'operación'} (${ms}ms)`));
        }, ms);
      });
      return Promise.race([promise, timeoutPromise]).finally(() => clearTimeout(timeoutId));
    }

    async function asegurarSesionVigente() {
      if (sessionCheckInFlight) return true;
      sessionCheckInFlight = true;
      try {
        const { data: { session } } = await withTimeout(sb.auth.getSession(), 12000, 'verificar sesión');
        state.session = session;
        if (!session) {
          state.usuario = null;
          cleanupRealtimeListeners();
          render();
          mostrarToast('⚠️ Tu sesión expiró. Volvé a iniciar sesión.', 'error');
          return false;
        }

        const exp = Number(session.expires_at || 0) * 1000;
        const faltaMs = exp - Date.now();
        if (exp && faltaMs < 60_000) {
          const { data, error } = await withTimeout(sb.auth.refreshSession(), 12000, 'refrescar sesión');
          if (!error && data?.session) {
            state.session = data.session;
          }
        }
        return true;
      } catch (e) {
        console.error('Error al asegurar sesión:', e);
        mostrarToast('⚠️ No se pudo verificar sesión. Probá refrescar.', 'error');
        return false;
      } finally {
        sessionCheckInFlight = false;
      }
    }

    async function guardarOneSignalIdsEnUsuario({ osId, pushId }) {
      try {
        if (!osId && !pushId) return;
        if (!state.session?.user?.id) return;
        const key = `onesignal_saved_${state.session.user.id}`;
        const prev = localStorage.getItem(key);
        const nuevo = JSON.stringify({ osId: osId || null, pushId: pushId || null });
        if (prev === nuevo) return;

        const patch = {};
        if (osId) patch.onesignal_id = osId;
        if (pushId) patch.onesignal_push_id = pushId;
        if (Object.keys(patch).length === 0) return;

        const { error } = await withTimeout(
          sb.from('usuarios').update(patch).eq('id', state.session.user.id),
          12000,
          'guardar onesignal ids'
        );
        if (error) {
          const msg = String(error?.message || '');
          if (msg.toLowerCase().includes('column') && msg.toLowerCase().includes('does not exist')) {
            console.warn('Faltan columnas onesignal_id / onesignal_push_id en usuarios.');
            return;
          }
          throw error;
        }

        try { await cargarUsuario(); } catch (e) { /* noop */ }
        localStorage.setItem(key, nuevo);
      } catch (e) {
        console.error('No se pudieron guardar IDs de OneSignal en usuarios:', e);
      }
    }

    // Supabase Realtime Listener (for Ñangareko new alerts)
    function cleanupRealtimeListeners() {
      (realtimeChannels || []).forEach((ch) => {
        try { sb.removeChannel(ch); } catch (e) { /* noop */ }
      });
      realtimeChannels = [];
    }

    function setupRealtimeListeners() {
      cleanupRealtimeListeners();

      // Suscripción a la tabla 'congregantes' para notificar nuevos ingresos
      const alertasNuevosChannel = sb.channel('alertas-nuevos')
        .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'congregantes' }, async (payload) => {
          const nuevoCongregante = payload.new;

          // 1. Verificar si el nuevo congregante es un "Nuevo" (estado 'nuevo')
          //    y si no tiene un ñangareko asignado aún (la alerta no se disparó antes)
          if (nuevoCongregante.estado === 'nuevo' && !nuevoCongregante.nangareko_id) {

            // 2. Si el usuario actual es un Ñangareko, actualiza su lista de alertas
            if (state.usuario?.rol === 'nangareko') {
              await cargarDatosNangareko();
              mostrarToast(`🚨 ¡Nuevo ingreso! ${nuevoCongregante.nombre}`);
              render();
            }
          }
        })
        .subscribe();

      // Suscripción general para mantener listas actualizadas (Hory / Pastor / Ñangareko / Líder DC)
      // Nota: esto depende de Realtime habilitado en Supabase para la tabla y de que RLS permita ver filas.
      const congregantesSyncChannel = sb.channel('congregantes-sync')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'congregantes' }, async () => {
          if (realtimeRefreshTimer) clearTimeout(realtimeRefreshTimer);
          realtimeRefreshTimer = setTimeout(async () => {
            if (realtimeRefreshInFlight) return;
            realtimeRefreshInFlight = true;
            try {
              await cargarCongregantes();
              if (state.usuario?.rol === 'nangareko') {
                await cargarDatosNangareko();
              }
              if (state.usuario?.rol === 'pastor') {
                await cargarDatosPastor();
              }
              if (state.usuario?.rol === 'lider_dc') {
                await cargarDatosLiderDC();
              }
              if (['asistencia', 'home', 'nangareko-alertas', 'nangareko-cuidados', 'lider-dc-asistencia'].includes(state.pantalla)) {
                render();
              }
            } finally {
              realtimeRefreshInFlight = false;
            }
          }, 500);
        })
        .subscribe();

      realtimeChannels.push(alertasNuevosChannel, congregantesSyncChannel);
    }

    window.cambiarPantalla = async function (pantalla) {
      if (navigationInFlight) return;
      navigationInFlight = true;
      const watchdog = setTimeout(() => {
        if (navigationInFlight) {
          navigationInFlight = false;
          mostrarToast('⚠️ La operación tardó demasiado. Probá de nuevo.', 'error');
          try { render(); } catch (e) { console.error('Error al renderizar:', e); }
        }
      }, 25000);

      const pantallaAnterior = state.pantalla;
      state.pantalla = pantalla;
      state.busqueda = '';

      if (!handlingPopState) {
        ensureHistoryInitialized();
        try {
          history.pushState({ pantalla }, '', location.href);
        } catch (e) {
          console.error('No se pudo pushState:', e);
        }
      }
      try { render(); } catch (e) { console.error('Error al renderizar:', e); }

      try {
        if (pantallaAnterior === 'asistencia' && pantalla !== 'asistencia') {
          await withTimeout(guardarAsistencias(), 20000, 'guardar asistencias');
        }

        if (pantalla === 'asistencia') {
          await withTimeout(cargarCongregantes(), 20000, 'cargar congregantes');
          if (state.usuario?.rol === 'hory') {
            await withTimeout(cargarUsuariosAsistencia(), 20000, 'cargar usuarios asistencia');
          }
          const cache = state.asistenciasPorServicio?.[state.servicioActivo];
          if (cache && Object.keys(cache).length > 0) {
            state.asistenciasHoy = { ...cache };
          } else {
            await withTimeout(cargarAsistenciasHoy(), 20000, 'cargar asistencias');
          }
        }

        if (pantalla === 'home') {
          if (state.usuario?.rol === 'pastor') await withTimeout(cargarDatosPastor(), 20000, 'cargar datos pastor');
          if (state.usuario?.rol === 'nangareko') await withTimeout(cargarDatosNangareko(), 20000, 'cargar datos ñangareko');
          if (state.usuario?.rol === 'lider_dc') await withTimeout(cargarDatosLiderDC(), 20000, 'cargar datos líder dc');
          if (state.usuario?.rol === 'hory') await withTimeout(cargarStatsHory(), 20000, 'cargar stats hory');
        }

        if (pantalla === 'lider-dc-asistencia') {
          state.asistenciaDCHoy = {};
        }
      } catch (e) {
        console.error('Error al cambiar de pantalla:', e);
        const detalle = String(e?.message || '');
        if (detalle.startsWith('Timeout:')) {
          mostrarToast('⚠️ La operación tardó demasiado. ' + detalle.replace('Timeout: ', ''), 'error');
        } else {
          mostrarToast('⚠️ Ocurrió un error o la conexión está lenta. Probá de nuevo.', 'error');
        }
      } finally {
        clearTimeout(watchdog);
        navigationInFlight = false;
        try { render(); } catch (e) { console.error('Error al renderizar:', e); }
      }
    };

    window.actualizarRolLiderazgoCongregante = async function (congreganteId, nuevoRolLiderazgo) {

    window.activarHitoCongregante = async function (congreganteId, hito) {
      try {
        const c = (state.misCuidados || []).find(x => x?.id === congreganteId)
          || (state.congregantes || []).find(x => x?.id === congreganteId)
          || (state.miembrosGrupo || []).find(x => x?.id === congreganteId)
          || null;

        if (!c) {
          mostrarToast('⚠️ No se encontró el congregante en memoria. Probá recargar.', 'error');
          return;
        }

        const patch = {};
        if (hito === 'anua') {
          if (typeof c?.ya_anua === 'undefined') {
            mostrarToast('⚠️ Falta crear la columna ya_anua en congregantes.', 'error');
            return;

          if (c?.ya_anua) return;
          patch.ya_anua = true;
          if (!['bautizado', 'en_dc', 'graduado'].includes(c?.estado)) patch.estado = 'en_anua';
        } else if (hito === 'bautizado') {

          patch.ya_bautizado = true;
          if (!['en_dc', 'graduado'].includes(c?.estado)) patch.estado = 'bautizado';
        } else {
          return;
        }

        const { error } = await withTimeout(
          sb.from('congregantes').update(patch).eq('id', congreganteId),
          12000,
          'activar hito'
        );
        if (error) throw error;

        actualizarCongreganteEnColecciones(congreganteId, patch);
        mostrarToast('✅ Actualizado');
        render();
      } catch (e) {

async function cargarDatosPastor() {
    if (!state.usuario || state.usuario.rol !== 'pastor') return;

    const fechaLimite = new Date();
    fechaLimite.setDate(fechaLimite.getDate() - 7);
    const fechaStr = fechaLimite.toISOString().split('T')[0];

    const [
      congregantesRes,
      lideresRes,
      nuevosRes,
      asistDomRes,
      asistMieRes,
      ultimosRes,
      alertasRes,
      gruposRes
    ] = await Promise.all([
      sb.from('congregantes').select('*'),
      sb.from('usuarios').select('*').order('nombre', { ascending: true }),
      sb.from('congregantes').select('id', { count: 'exact' }).gte('created_at', fechaStr),
      sb.from('asistencias').select('presente').eq('tipo_servicio', 'domingo').gte('fecha', fechaStr),
      sb.from('asistencias').select('presente').eq('tipo_servicio', 'miercoles').gte('fecha', fechaStr),
      sb.from('congregantes').select('nombre, created_at').order('created_at', { ascending: false }).limit(5),
      sb.from('alertas').select('tipo, mensaje, created_at').order('created_at', { ascending: false }).limit(5),
      sb.from('grupos_dc').select('*, lider:lider_id(nombre)').order('created_at', { ascending: false })
    ]);

    if (congregantesRes.error) {
      console.error('Error al cargar congregantes (Pastor):', congregantesRes.error);
      mostrarToast('⚠️ No se pudieron cargar congregantes (ver permisos/RLS)', 'error');
      state.congregantes = [];
    } else {
      state.congregantes = congregantesRes.data || [];
    }

    if (lideresRes.error) {
      console.error('Error al cargar usuarios/líderes (Pastor):', lideresRes.error);
      state.lideres = [];
    } else {
      state.lideres = lideresRes.data || [];
    }

    if (nuevosRes.error) {
      console.error('Error al cargar nuevos (Pastor):', nuevosRes.error);
      state.nuevosUltimaSemana = 0;
    } else {
      state.nuevosUltimaSemana = nuevosRes.data?.length || 0;
    }

    const asistenciasDomingo = asistDomRes.error ? [] : (asistDomRes.data || []);
    const asistenciasMiercoles = asistMieRes.error ? [] : (asistMieRes.data || []);
    if (asistDomRes.error) console.error('Error al cargar asistencias domingo (Pastor):', asistDomRes.error);
    if (asistMieRes.error) console.error('Error al cargar asistencias miércoles (Pastor):', asistMieRes.error);

    const todasAsistencias = [...asistenciasDomingo, ...asistenciasMiercoles];
    if (todasAsistencias.length > 0) {
      const presentes = todasAsistencias.filter(a => a.presente).length;
      state.asistenciaPromedio = Math.round((presentes / todasAsistencias.length) * 100);
    } else {
      state.asistenciaPromedio = 0;
    }

    state.pastorStats = {
      domingo_presentes_7d: asistenciasDomingo.filter(a => a.presente).length,
      miercoles_presentes_7d: asistenciasMiercoles.filter(a => a.presente).length,
      total_congregantes: (state.congregantes || []).length,
      atendidos_por_nangareko: (state.congregantes || []).filter(c => Boolean(c?.nangareko_id)).length,
      en_dc: (state.congregantes || []).filter(c => Boolean(c?.grupo_dc_id) && ['en_dc', 'graduado'].includes(c?.estado)).length
    };

    if (ultimosRes.error) {
      console.error('Error al cargar últimos ingresos (Pastor):', ultimosRes.error);
      state.ultimosCongregantes = [];
    } else {
      state.ultimosCongregantes = ultimosRes.data || [];
    }

    if (alertasRes.error) {
      console.error('Error al cargar alertas (Pastor):', alertasRes.error);
      state.alertasRecientes = [];
    } else {
      state.alertasRecientes = alertasRes.data || [];
    }

    if (gruposRes.error) {
      console.error('Error al cargar grupos DC (Pastor):', gruposRes.error);
      state.gruposDC = [];
    } else {
      state.gruposDC = gruposRes.data || [];
    }

    try {
      const ids = (state.congregantes || []).map(c => c?.id).filter(Boolean);
      if (ids.length > 0) {
        const { data, error } = await withTimeout(
          sb.from('fichas_nangareko')
            .select('congregante_id, nangareko_id, created_at')
            .in('congregante_id', ids)
            .order('created_at', { ascending: false })
            .limit(2000),
          20000,
          'cargar ultimo nangareko'
        );
        if (error) throw error;
        const map = {};
        for (const f of (data || [])) {
          if (!f?.congregante_id || !f?.nangareko_id) continue;
          if (!map[f.congregante_id]) map[f.congregante_id] = f.nangareko_id;
        }
        state.pastorUltimoNangarekoPorCongregante = map;
      } else {
        state.pastorUltimoNangarekoPorCongregante = {};
      }
    } catch (e) {
      console.error('Error al cargar ultimo nangareko por congregante:', e);
      state.pastorUltimoNangarekoPorCongregante = {};
    }

    // Gráfico removido: ahora existe pantalla de estadísticas.
}

    window.setPastorLiderazgoDraftRol = function (rol) {
      if (!state.pastorLiderazgoDraft) state.pastorLiderazgoDraft = { congreganteId: '', rol: '' };
      state.pastorLiderazgoDraft.rol = rol || '';
      render();

    window.guardarPastorLiderazgoDraft = async function () {
      try {
        const congreganteId = String(document.getElementById('pastor-liderazgo-congregante')?.value || state.pastorLiderazgoDraft?.congreganteId || '');
        const rol = String(document.getElementById('pastor-liderazgo-rol')?.value || state.pastorLiderazgoDraft?.rol || '');
        if (!congreganteId) {
          mostrarToast('⚠️ Seleccioná un congregante', 'error');
          return;
        }
        if (!rol || !['lider', 'hory', 'nangareko', 'lider_dc'].includes(rol)) {
          mostrarToast('⚠️ Seleccioná un rol válido', 'error');
          return;
        }

        const ejemplo = (state.congregantes || [])[0];
        if (typeof ejemplo?.rol_liderazgo === 'undefined') {
          mostrarToast('⚠️ Falta crear la columna rol_liderazgo en congregantes (para líderes sin app).', 'error');
          return;
        }

        await actualizarRolLiderazgoCongregante(congreganteId, rol);
        state.pastorLiderazgoDraft = { congreganteId: '', rol: '' };
        render();
      } catch (e) {
        console.error('Error al guardar liderazgo draft:', e);
        mostrarToast('⚠️ No se pudo guardar', 'error');
      }

        if (!congreganteId) {
          mostrarToast('⚠️ Seleccioná un congregante', 'error');

        }
        const { error } = await withTimeout(
          sb.from('congregantes').update({ grupo_dc_id: grupoId }).eq('id', congreganteId),
          20000,
          'agregar miembro grupo'
        );
        if (error) throw error;
        mostrarToast('✅ Integrante agregado');
        await cargarCongregantes();
        await cargarDatosPastor();
        render();

        console.error('Error al agregar integrante:', e);
        mostrarToast('⚠️ No se pudo agregar: ' + (e?.message || 'sin detalle'), 'error');
      }

    window.mostrarModalCrearGrupo = function () {
      const nombre = prompt('Nombre del grupo DC:');
      if (!nombre) return;
      const dia = prompt('Día de reunión (ej: Martes):');
      const hora = prompt('Hora de reunión (ej: 19:30):');

      sb.from('grupos_dc').insert({ nombre, dia_reunion: dia, hora_reunion: hora })
        .then(() => {
          mostrarToast(`✅ Grupo "${nombre}" creado`);
          cargarDatosPastor();
          cambiarPantalla('pastor-grupos');
        });
    };

    window.asignarLiderGrupo = async function (grupoId) {
      let lideres = state.lideres || [];
      lideres = lideres.filter(l => {
        const rol = String(l.rol || '').toLowerCase();
        return rol === 'lider_dc' || rol === 'liderdc' || rol === 'lider dc' || rol === 'nangareko';
      });

      // Si todavía no hay, recargar desde DB (puede que state.lideres esté vacío/stale)
      if (lideres.length === 0) {
        try {
          const { data, error } = await withTimeout(
            sb.from('usuarios').select('id, nombre, email, rol').in('rol', ['lider_dc', 'nangareko']).order('nombre', { ascending: true }),
            20000,
            'cargar líderes dc'
          );
          if (error) throw error;
          lideres = data || [];
        } catch (e) {
          console.error('Error al cargar líderes DC:', e);
          mostrarToast('⚠️ No se pudieron cargar líderes DC', 'error');
          return;
        }
      }

      if (lideres.length === 0) {
        mostrarToast('No hay líderes DC registrados', 'error');
        return;
      }

      const lista = lideres.map((l, i) => `${i + 1}. ${l.nombre} (${l.email})`).join('\n');
      const seleccion = prompt(`Seleccioná un líder para este grupo:\n\n${lista}\n\nEscribí el número:`);
      const idx = parseInt(seleccion) - 1;
      if (idx >= 0 && idx < lideres.length) {
        await sb.from('grupos_dc').update({ lider_id: lideres[idx].id }).eq('id', grupoId);
        mostrarToast(`✅ Líder asignado`);
        await cargarDatosPastor();
        cambiarPantalla('pastor-grupos');
      }
    };

    window.pastorAgregarLider = async function () {
      const email = (prompt('Email del líder (debe tener cuenta creada):') || '').trim();
      if (!email) return;
      const rol = (prompt('Rol a asignar (hory / nangareko / lider_dc):') || '').trim();
      if (!rol) return;

      try {
        const { data, error } = await withTimeout(
          sb.from('usuarios').select('*').eq('email', email).maybeSingle(),
          20000,
          'buscar líder por email'
        );
        if (error) throw error;
        if (!data) {
          mostrarToast('⚠️ No existe un usuario con ese email. Esa persona debe registrarse primero.', 'error');
          return;
        }
        const { error: upErr } = await withTimeout(
          sb.from('usuarios').update({ rol }).eq('id', data.id),
          20000,
          'actualizar rol'
        );
        if (upErr) throw upErr;
        mostrarToast('✅ Líder actualizado');
        await cargarDatosPastor();
        render();
      } catch (e) {
        console.error('Error al agregar líder:', e);
        mostrarToast('⚠️ No se pudo agregar/actualizar el líder: ' + (e?.message || 'sin detalle'), 'error');
      }
    };

    window.verHistorialFichasPastorCongregante = async function (congreganteId, congreganteNombre) {
      try {
        const [pastorRes, nangarekoRes, dcRes] = await Promise.all([
          withTimeout(
            sb.from('fichas_pastor_congregantes')
              .select('*')
              .eq('congregante_id', congreganteId)
              .order('created_at', { ascending: false })
              .limit(50),
            20000,
            'historial pastor'
          ),
          withTimeout(
            sb.from('fichas_nangareko')
              .select('*')
              .eq('congregante_id', congreganteId)
              .order('created_at', { ascending: false })
              .limit(50),
            20000,
            'historial nangareko'
          ),
          withTimeout(
            sb.from('fichas_dc')
              .select('*')
              .eq('congregante_id', congreganteId)
              .order('created_at', { ascending: false })
              .limit(50),
            20000,
            'historial dc'
          )
        ]);

        const fichas = [];

        if (!pastorRes?.error) {
          for (const f of (pastorRes.data || [])) {
            fichas.push({
              ...f,
              fuente: 'Pastor',
              user_id: f.pastor_id
            });
          }
        }
        if (!nangarekoRes?.error) {
          for (const f of (nangarekoRes.data || [])) {
            fichas.push({
              ...f,
              fuente: 'Ñangareko',
              user_id: f.nangareko_id
            });
          }
        }
        if (!dcRes?.error) {
          for (const f of (dcRes.data || [])) {
            fichas.push({
              ...f,
              fuente: 'Líder DC',
              user_id: f.lider_id
            });
          }
        }

        fichas.sort((a, b) => String(b.created_at || '').localeCompare(String(a.created_at || '')));

        const lideres = state.lideres || [];
        const nombrePorId = (id) => (lideres.find(x => x?.id === id)?.nombre) || '';
        state.pastorHistorialCongreganteTarget = { id: congreganteId, nombre: congreganteNombre };
        state.pastorHistorialCongregante = fichas.map(f => ({
          ...f,

    function actualizarCongreganteEnColecciones(congreganteId, patch) {
      const colecciones = [
        state.congregantes,
        state.misCuidados,
        state.alertasNuevos,
        state.miembrosGrupo
      ];

      for (const col of colecciones) {
        if (!Array.isArray(col)) continue;
        const idx = col.findIndex(c => c?.id === congreganteId);
        if (idx >= 0) col[idx] = { ...col[idx], ...patch };
      }
    }

    window.actualizarEstadoCongregante = async function (congreganteId, nuevoEstado) {
      try {
        if (nuevoEstado === 'graduado') {
          const c = (state.misCuidados || []).find(x => x?.id === congreganteId)
            || (state.congregantes || []).find(x => x?.id === congreganteId)
            || (state.miembrosGrupo || []).find(x => x?.id === congreganteId)
            || null;

          if (typeof c?.ya_anua === 'undefined') {
            mostrarToast('⚠️ Falta crear la columna ya_anua en congregantes para controlar el requisito de Añua.', 'error');
            return;
          }

          const anuaOk = Boolean(c?.ya_anua);
          const bautismoOk = Boolean(c?.ya_bautizado);
          const dcOk = Boolean(c?.grupo_dc_id);

          if (!anuaOk || !bautismoOk || !dcOk) {
            mostrarToast('⚠️ Para graduar debe completar: Añua + Bautismo + estar en un DC.', 'error');
            return;
          }
        }

        const patch = { estado: nuevoEstado };
        if (nuevoEstado === 'en_anua') {
          patch.ya_anua = true;
        }
        if (nuevoEstado === 'bautizado') {
          patch.ya_bautizado = true;
        }
        if (nuevoEstado === 'graduado') {
          patch.nangareko_id = null;
        }

        let res;
        if (nuevoEstado === 'graduado') {
          const hoyYmd = new Date().toISOString().split('T')[0];
          res = await withTimeout(
            sb.rpc('marcar_congregante_graduado', { p_congregante_id: congreganteId, p_hoy: hoyYmd }),
            12000,
            'actualizar estado'
          );
        } else {
          res = await withTimeout(
            sb.from('congregantes').update(patch).eq('id', congreganteId),
            12000,
            'actualizar estado'
          );
        }
        const { error } = res || {};
        if (error) throw error;

        actualizarCongreganteEnColecciones(congreganteId, patch);
        mostrarToast('✅ Estado actualizado');
        render();
      } catch (e) {
        console.error('Error al actualizar estado:', e);
        mostrarToast('⚠️ No se pudo actualizar el estado: ' + (e?.message || 'sin detalle'), 'error');
        await cargarCongregantes();
        render();
      }
    };

          || (state.miembrosGrupo || []).find(x => x?.id === congreganteId)

        const patch = { grupo_dc_id };
        if (grupo_dc_id && !['en_dc', 'graduado'].includes(c?.estado)) {

        const { error } = await withTimeout(

    async function cargarDatosNangareko() {
      if (!state.usuario || state.usuario.rol !== 'nangareko') return;

      const userId = state.usuario.id;

      const [
        misCuidadosRes,
        nuevosSinAsignarRes,
        gruposRes
      ] = await Promise.all([
        sb.from('congregantes')
          .select('*')
          .eq('nangareko_id', userId)
          .order('created_at', { ascending: false }),
        sb.from('congregantes')
          .select('*')
          .is('nangareko_id', null)
          .eq('estado', 'nuevo')
          .order('created_at', { ascending: false }),
        sb.from('grupos_dc').select('id, nombre').order('nombre', { ascending: true })
      ]);

      state.misCuidados = misCuidadosRes?.data || [];
      state.alertasNuevos = nuevosSinAsignarRes?.data || [];

      try {
        state.nangarekoAvisos = await calcularAvisosNangareko(state.misCuidados);

        if ((state.misCuidados?.length || 0) > 0 && (state.nangarekoAvisos?.length || 0) === 0) {
          const ids = (state.misCuidados || []).map(c => c.id).filter(Boolean);
          if (ids.length > 0) {
            const { count, error } = await sb
              .from('asistencias')
              .select('id', { count: 'exact', head: true })
              .in('congregante_id', ids)
              .in('tipo_servicio', ['miercoles', 'domingo'])
              .eq('presente', true);
            if (error) {
              console.error('No se pudo verificar asistencias para avisos (Ñangareko):', error);
              mostrarToast('⚠️ No se pudieron leer asistencias para calcular avisos (permisos/RLS).', 'error');
            } else if ((count || 0) === 0) {
              mostrarToast('ℹ️ No se ven asistencias (domingo/miércoles) para tus cuidados. Si en Supabase sí existen, es casi seguro un bloqueo por RLS (políticas).', 'error');
            }
          }
        }
      } catch (e) {
        console.error('Error al calcular avisos (Ñangareko):', e);
        mostrarToast('⚠️ No se pudieron calcular los avisos: ' + (e?.message || 'revisá conexión/permisos'), 'error');
        state.nangarekoAvisos = [];
      }

      if (gruposRes?.error) {
        console.error('Error al cargar grupos DC (Ñangareko):', gruposRes.error);
        mostrarToast('⚠️ No se pudieron cargar los Grupos DC (permisos/RLS).', 'error');
      } else {
        state.gruposDC = gruposRes.data || [];
        if (state.gruposDC.length === 0) {
          mostrarToast('ℹ️ No hay Grupos DC cargados. Pedile al pastor que cree grupos o revisá permisos.', 'error');
        }
      }

      const fechaLimite = new Date();
      fechaLimite.setDate(fechaLimite.getDate() - 7);
      const fechaStr = fechaLimite.toISOString().split('T')[0];

      const { data: contactos } = await sb.from('fichas_nangareko')
        .select('id', { count: 'exact' })
        .eq('nangareko_id', userId)
        .gte('created_at', fechaStr);
      state.contactosSemana = contactos?.length || 0;

      const { data: ultimosContactos } = await sb.from('fichas_nangareko')
        .select('*, congregantes(nombre)')
        .eq('nangareko_id', userId)
        .order('created_at', { ascending: false })
        .limit(5);

      const container = document.getElementById('ultimos-contactos');
      if (container) {
        if (ultimosContactos && ultimosContactos.length > 0) {
          container.innerHTML = ultimosContactos.map(f => `
          <div class="info-row">
            <span class="label">${f.congregantes?.nombre || 'Desconocido'}</span>
            <span style="font-size:12px">${f.tipo_contacto} · ${new Date(f.created_at).toLocaleDateString()}</span>
          </div>
        `).join('');
        } else {
          container.innerHTML = '<div class="info-row"><span class="label">No hay contactos registrados aún</span></div>';
        }
      }
    }

    window.guardarFichaContacto = async function (congreganteId) {
      const btn = document.getElementById('btn-guardar-ficha');
      const btnTxt = btn?.textContent;
      try {
        if (btn) { btn.disabled = true; btn.textContent = 'Guardando...'; }

        const okSesion = await asegurarSesionVigente();
        if (!okSesion) return;

        const tipo = document.getElementById('ficha-tipo')?.value;
        const versiculo = document.getElementById('ficha-versiculo')?.value;
        const estadoAnimo = document.getElementById('ficha-animo')?.value;
        const motivoOracion = document.getElementById('ficha-oracion')?.value;
        const notas = document.getElementById('ficha-notas')?.value;
        const esPorAusencia = document.getElementById('ficha-por-ausencia')?.checked || false;

        const { error } = await withTimeout(
          sb.from('fichas_nangareko').insert({
            congregante_id: congreganteId,
            nangareko_id: state.usuario.id,
            tipo_contacto: tipo,
            versiculo_compartido: versiculo || null,
            estado_animo: estadoAnimo,
            motivo_oracion: motivoOracion || null,
            notas_adicionales: notas || null,
            es_por_ausencia: esPorAusencia
          }),
          20000,
          'guardar ficha contacto ñangareko'
        );

        if (error) throw error;

        mostrarToast('✅ Contacto registrado correctamente');

        state.congreganteSeleccionado = null;
        await withTimeout(cargarDatosNangareko(), 20000, 'recargar datos ñangareko');
        cambiarPantalla('home');
      } catch (e) {
        console.error('Error al guardar ficha contacto (Ñangareko):', e);
        const msg = String(e?.message || 'sin detalle');
        if (msg.toLowerCase().includes('jwt') || msg.toLowerCase().includes('token') || msg.toLowerCase().includes('session')) {
          mostrarToast('⚠️ Tu sesión parece vencida. Probá recargar e iniciar sesión.', 'error');
        } else if (msg.startsWith('Timeout:')) {
          mostrarToast('⚠️ Guardar tardó demasiado. Revisá tu conexión e intentá de nuevo.', 'error');
        } else {
          mostrarToast('⚠️ No se pudo guardar: ' + msg, 'error');
        }
      } finally {
        if (btn) { btn.disabled = false; btn.textContent = btnTxt || '✅ Guardar contacto'; }
      }
    };

    window.abrirFichaContacto = function (id, nombre) {
      state.congreganteSeleccionado = { id, nombre };
      cambiarPantalla('nangareko-fichas');
    };

    window.verHistorialFichas = async function (congreganteId) {
      const { data: historial } = await sb.from('fichas_nangareko')
        .select('*')
        .eq('congregante_id', congreganteId)
        .order('created_at', { ascending: false });

      const congregante = state.misCuidados?.find(c => c.id === congreganteId);
      const nombre = congregante?.nombre || 'Desconocido';

      if (!historial || historial.length === 0) {
        mostrarToast(`📭 ${nombre} - No hay contactos registrados aún`);
        return;
      }

      const resumen = historial.slice(0, 5).map(f =>
        `📅 ${new Date(f.created_at).toLocaleDateString()}: ${f.tipo_contacto} - Ánimo: ${f.estado_animo}`
      ).join('\n');

      alert(`📜 Historial de ${nombre}:\n\n${resumen}\n\n${historial.length > 5 ? `... y ${historial.length - 5} más` : ''}`);
    };

    async function cargarDatosLiderDC() {
      if (!state.usuario || state.usuario.rol !== 'lider_dc') return;

      const userId = state.usuario.id;

      const { data: grupo } = await sb.from('grupos_dc')
        .select('*')
        .eq('lider_id', userId)
        .single();
      state.miGrupo = grupo || null;

      if (state.miGrupo) {
        const { data: miembros } = await sb.from('congregantes')
          .select('*')
          .eq('grupo_dc_id', state.miGrupo.id)
          .order('nombre');
        state.miembrosGrupo = miembros || [];
      } else {
        state.miembrosGrupo = [];
      }

      try {
        const candidatosAvisos = (state.miembrosGrupo || []).filter(m => {
          const estadoOk = ['en_dc', 'graduado'].includes(String(m?.estado || ''));
          const desligado = !m?.nangareko_id;
          return estadoOk && desligado;
        });
        state.liderDCAvisos = await calcularAvisosLiderDC(candidatosAvisos);
      } catch (e) {
        console.error('Error al calcular avisos (Líder DC):', e);
        mostrarToast('⚠️ No se pudieron calcular los avisos del DC: ' + (e?.message || 'revisá conexión/permisos'), 'error');
        state.liderDCAvisos = [];
      }

      const { data: ultimosContactos } = await sb.from('fichas_dc')
        .select('*, congregantes(nombre)')
        .eq('lider_id', userId)
        .order('created_at', { ascending: false })
        .limit(5);

      const container = document.getElementById('ultimos-contactos-dc');
      if (container) {
        if (ultimosContactos && ultimosContactos.length > 0) {
          container.innerHTML = ultimosContactos.map(f => `
          <div class="info-row">
            <span class="label">${f.congregantes?.nombre || 'Desconocido'}</span>
            <span style="font-size:12px">${f.tipo_contacto} · ${new Date(f.created_at).toLocaleDateString()}</span>
          </div>
        `).join('');
        } else {
          container.innerHTML = '<div class="info-row"><span class="label">No hay contactos registrados aún</span></div>';
        }
      }
    }

        const { error } = await sb.from('asistencias').upsert({
          congregante_id: congreganteId,
          tipo_servicio: 'dc',
          fecha: hoy,
          presente: presente,
          registrado_por: state.usuario.id
        }, { onConflict: 'congregante_id,tipo_servicio,fecha' });

        if (error) errores++;
      }

      if (errores > 0) {
        mostrarToast(`⚠️ ${errores} errores al guardar`, 'error');
      } else {
        mostrarToast('✅ Asistencia guardada correctamente');
        cambiarPantalla('home');

        .order('created_at', { ascending: false });

      ).join('\n');

      alert(`📜 Historial de ${nombre}:\n\n${resumen}\n\n${historial.length > 5 ? `... y ${historial.length - 5} más` : ''}`);

    // Function to handle changing service in attendance screen
    window.cambiarServicio = async function (servicio) {
      if (serviceChangeInFlight) return;
      serviceChangeInFlight = true;

      try {
        // Guardar antes de cambiar, para no perder el trabajo si el Hory navega entre servicios
        await withTimeout(guardarAsistencias(), 20000, 'guardar asistencias');

        state.servicioActivo = servicio;

        // Si ya tenemos cache local del servicio, úsalo; si no, carga desde DB
        const cache = state.asistenciasPorServicio?.[servicio];
        if (cache && Object.keys(cache).length > 0) {
          state.asistenciasHoy = { ...cache };
        } else {
          await withTimeout(cargarAsistenciasHoy(), 20000, 'cargar asistencias');
        }

        render();

        // Update service buttons UI
        document.querySelectorAll('.servicio-btn').forEach(btn => btn.classList.remove('active'));
        const activeBtn = document.querySelector(`.servicio-btn[onclick="cambiarServicio('${servicio}')"]`);
        if (activeBtn) activeBtn.classList.add('active');
      } catch (e) {
        console.error('Error al cambiar servicio:', e);
        const detalle = String(e?.message || '');
        if (detalle.startsWith('Timeout:')) {
          mostrarToast('⚠️ La operación tardó demasiado. ' + detalle.replace('Timeout: ', ''), 'error');
        } else {
          mostrarToast('⚠️ Error al cambiar servicio. Probá de nuevo.', 'error');
        }
      } finally {
        serviceChangeInFlight = false;
      }
    };

    /**
     * Filters the congregant list based on the search input value.
     * This function is called by the debounced version to avoid excessive updates.

    window.filtrarBusqueda = function (valor) {
      state.busqueda = valor;
      const lista = document.getElementById('lista-congregantes');
      if (!lista) return;

      const esHory = state.usuario?.rol === 'hory';

      const busq = String(valor || '').toLowerCase();
      const personas = [
        ...(state.congregantes || []).map(c => ({ tipo: 'congregante', id: `congregante:${c.id}`, persona_id: c.id, nombre: c.nombre, foto_url: c.foto_url, estado: c.estado })),
        ...(state.usuariosAsistencia || []).map(u => ({ tipo: 'usuario', id: `usuario:${u.id}`, persona_id: u.id, nombre: u.nombre, foto_url: u.foto_url, rol: u.rol }))
      ];

      const filtrados = personas.filter(p => String(p?.nombre || '').toLowerCase().includes(busq));

      lista.innerHTML = filtrados.length === 0 ?
        `<div style="text-align:center;color:var(--texto-suave);padding:32px;font-size:14px">No se encontraron resultados.</div>` :
        filtrados.map(p => {
          const presente = state.asistenciasHoy[p.id] || false;
          const iniciales = String(p.nombre || '').split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
          return `
        <div class="congregante-item ${presente ? 'presente' : ''}" id="item-${p.id}">
          <div class="congregante-left">
            <div class="congregante-foto">${p.foto_url ? `<img src="${p.foto_url}" />` : sanitizar(iniciales)}</div>
            <div>
              <div class="congregante-nombre">${sanitizar(p.nombre || '')}${p.tipo === 'usuario' ? ' ⭐' : ''}</div>
              ${esHory ? '' : (p.tipo === 'congregante' ? `<div class="congregante-estado estado-${p.estado}">${estadoLabel(p.estado)}</div>` : '')}
            </div>
          </div>
          <label class="switch">
            <input type="checkbox" ${presente ? 'checked' : ''} onchange="toggleAsistencia('${p.id}', this.checked)" />
            <span class="slider"></span>
          </label>
        </div>`;
        }).join('');
    };

    // Performance Optimization: Debounce for search input to prevent excessive DOM manipulation
    // NOTE: This definition MUST appear AFTER the definition of `filtrarBusqueda` to avoid ReferenceError.
    window.debouncedFiltrarBusqueda = debounce(filtrarBusqueda, 300);

    /**
     * Updates local state and UI for attendance. Does NOT save to database immediately.
     * @param {string} congreganteId - ID of the congregant.
     * @param {boolean} presente - True if present, false otherwise.
     */
    window.toggleAsistencia = function (congreganteId, presente) {
      state.asistenciasHoy[congreganteId] = presente;
      if (!state.asistenciasPorServicio) state.asistenciasPorServicio = { domingo: {}, miercoles: {} };
      if (!state.asistenciasPorServicio[state.servicioActivo]) state.asistenciasPorServicio[state.servicioActivo] = {};
      state.asistenciasPorServicio[state.servicioActivo][congreganteId] = presente;

      const item = document.getElementById('item-' + congreganteId);
      if (item) {
        if (presente) {
          item.classList.add('presente');
        } else {
          item.classList.remove('presente');
        }
      }

      const presentes = Object.values(state.asistenciasHoy).filter(Boolean).length;
      const statsCards = document.querySelectorAll('.stats-row .stat-card');
      if (statsCards.length >= 3) {
        const presentesCard = statsCards[1]?.querySelector('.stat-numero');
        const ausentesCard = statsCards[2]?.querySelector('.stat-numero');
        if (presentesCard) presentesCard.textContent = presentes;
        if (ausentesCard) ausentesCard.textContent = (state.asistenciaTotalActual || (state.congregantes || []).length) - presentes;
      }
    };

    async function cargarUsuariosAsistencia() {
      try {
        const { data, error } = await sb.from('usuarios').select('id, nombre, foto_url, rol').order('nombre', { ascending: true });
        if (error) throw error;
        state.usuariosAsistencia = (data || []).filter(u => u?.id && u?.nombre);

        console.error('Error al cargar usuarios para asistencia:', e);

      }

    /**
     * Saves all local attendance changes (from state.asistenciasHoy) to the database.
     * This is called when exiting the attendance screen.
     */
    window.guardarAsistencias = async function () {
      try {
        const hoy = new Date().toISOString().split('T')[0];
        const asistenciasCongregantes = [];
        const asistenciasUsuarios = [];

        for (const [personaKey, presente] of Object.entries(state.asistenciasHoy)) {
          const [tipoPersona, personaId] = String(personaKey || '').split(':');
          if (!personaId) continue;
          const row = {
            tipo_servicio: state.servicioActivo,
            fecha: hoy,
            presente: presente,
            registrado_por: state.usuario.id
          };
          if (tipoPersona === 'usuario') {
            row.usuario_id = personaId;
            row.congregante_id = null;
            asistenciasUsuarios.push(row);
          } else {
            row.congregante_id = personaId;
            row.usuario_id = null;
            asistenciasCongregantes.push(row);
          }
        }

        if (asistenciasCongregantes.length === 0 && asistenciasUsuarios.length === 0) return;

        if (asistenciasCongregantes.length > 0) {
          const { error } = await withTimeout(
            sb.from('asistencias').upsert(asistenciasCongregantes, {
              onConflict: 'congregante_id,tipo_servicio,fecha'
            }),
            12000,
            'guardar asistencias congregantes'
          );
          if (error) throw error;
        }

        if (asistenciasUsuarios.length > 0) {
          const { error } = await withTimeout(
            sb.from('asistencias').upsert(asistenciasUsuarios, {
              onConflict: 'usuario_id,tipo_servicio,fecha'
            }),
            12000,
            'guardar asistencias usuarios'
          );
          if (error) throw error;
        }

        if (!state.asistenciasPorServicio) state.asistenciasPorServicio = { domingo: {}, miercoles: {} };
        state.asistenciasPorServicio[state.servicioActivo] = { ...state.asistenciasHoy };
      } catch (e) {
        console.error('Error inesperado al guardar asistencias:', e);
        mostrarToast('⚠️ No se pudieron guardar las asistencias', 'error');
      }
    };

    window.addEventListener('error', (event) => {
      try {
        console.error('Error global:', event?.error || event);
      } catch (e) { /* noop */ }
    });

    window.addEventListener('unhandledrejection', (event) => {
      try {
        console.error('Promise rechazada sin manejar:', event?.reason || event);
        mostrarToast('⚠️ Ocurrió un error interno. Probá refrescar si persiste.', 'error');
